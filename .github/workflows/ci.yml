name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  frontend:
    name: frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The route-parity test (src/lib/__tests__/routeParity.test.ts) shells
      # out to `go run ./cmd/routegen` in gateway/ to get the gateway's real
      # registered routes — it's the mechanical safeguard against the portal
      # drifting from the routes the gateway actually serves again.
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend:
    name: backend (typecheck + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
        env:
          JWT_SECRET: ci-dummy-jwt-secret
          APP_ENV: test

  backend-integration:
    name: backend (integration + security, real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lintel
          POSTGRES_PASSWORD: lintel
          POSTGRES_DB: lintel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lintel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # The backend's migrate/test scripts read env from the repo-root .env
      # (node --env-file=../.env). Point them at the service container.
      - name: Write repo-root .env for the test runner
        run: |
          cat > ../.env <<'EOF'
          DATABASE_URL=postgres://lintel:lintel@localhost:5432/lintel_test?sslmode=disable
          JWT_SECRET=ci-dummy-jwt-secret
          APP_ENV=test
          APP_PUBLIC_URL=http://test.local
          EOF
      # lintel_internal is created out-of-band by the DB bootstrap in real
      # deployments (baseline migration comment ~:1447); a fresh CI Postgres
      # doesn't have it, and SECURITY DEFINER functions are owned by it.
      - name: Bootstrap DB roles
        run: |
          PGPASSWORD=lintel psql -h localhost -U lintel -d lintel_test -v ON_ERROR_STOP=1 -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'lintel_internal') THEN
                CREATE ROLE lintel_internal NOLOGIN BYPASSRLS;
              END IF;
              GRANT lintel_internal TO current_user;
            END \$\$;"
      - run: npm run migrate
      - run: npm run test:integration
      - run: npm run test:security

  gateway:
    name: gateway (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The gateway is being ported in-tree; skip cleanly if the module
      # isn't present on this ref instead of failing the whole pipeline.
      - name: Detect gateway module
        id: mod
        run: |
          if [ -f gateway/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "gateway/go.mod not found — nothing to check yet"
          fi
      - uses: actions/setup-go@v5
        if: steps.mod.outputs.present == 'true'
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum
      - name: go vet
        if: steps.mod.outputs.present == 'true'
        working-directory: gateway
        run: go vet ./...
      - name: go build
        if: steps.mod.outputs.present == 'true'
        working-directory: gateway
        env:
          CGO_ENABLED: "0"
        run: go build ./...
      - name: go test
        if: steps.mod.outputs.present == 'true'
        working-directory: gateway
        run: go test ./...

  controller:
    name: controller (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # controller/ hasn't landed yet; skip cleanly until it exists.
      - name: Detect controller module
        id: mod
        run: |
          if [ -f controller/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "controller/go.mod not found — nothing to check yet"
          fi
      - uses: actions/setup-go@v5
        if: steps.mod.outputs.present == 'true'
        with:
          go-version-file: controller/go.mod
      - name: go vet
        if: steps.mod.outputs.present == 'true'
        working-directory: controller
        run: go vet ./...
      - name: go build
        if: steps.mod.outputs.present == 'true'
        working-directory: controller
        env:
          CGO_ENABLED: "0"
        run: go build ./...
      - name: go test
        if: steps.mod.outputs.present == 'true'
        working-directory: controller
        run: go test ./...

  e2e:
    name: e2e (cross-module, real binaries over the wire)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The e2e harness builds and drives the real gateway + controller
      # binaries; skip cleanly until all three modules are present on this ref.
      - name: Detect e2e module
        id: mod
        run: |
          if [ -f e2e/go.mod ] && [ -f gateway/go.mod ] && [ -f controller/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "e2e/gateway/controller modules not all present — nothing to check yet"
          fi
      - uses: actions/setup-go@v5
        if: steps.mod.outputs.present == 'true'
        with:
          # e2e/go.mod pins the newest Go (matches gateway); the 1.25 toolchain
          # also builds the controller module (go 1.23) fine.
          go-version-file: e2e/go.mod
      - name: go vet
        if: steps.mod.outputs.present == 'true'
        working-directory: e2e
        run: go vet ./...
      - name: go test
        if: steps.mod.outputs.present == 'true'
        working-directory: e2e
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 -timeout 900s ./...
