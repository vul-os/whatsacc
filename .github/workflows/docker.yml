name: Docker

# Builds and publishes the gateway container image to GHCR:
#   ghcr.io/<owner>/lintel-gateway  (docs reference ghcr.io/vul-os/lintel-gateway)
#
# Tag scheme:
#   push to main  ->  latest
#   tag vX.Y.Z    ->  X.Y.Z, X.Y, latest
# Platforms: linux/amd64 + linux/arm64 (buildx + QEMU).

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gateway-image:
    name: gateway image (ghcr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect gateway Dockerfile
        id: detect
        run: |
          if [ -f gateway/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "gateway/Dockerfile not found — skipping image build"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.detect.outputs.present == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.detect.outputs.present == 'true'

      - name: Log in to GHCR
        if: steps.detect.outputs.present == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        if: steps.detect.outputs.present == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lintel-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        if: steps.detect.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: gateway
          file: gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
